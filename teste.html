<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cronograma Semanal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #fff5f5;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #7a1c1c;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    background: #8b1e1e;
    color: white;
    padding: 10px;
}

td {
    border: 2px solid #8b1e1e;
    height: 60px;
    text-align: center;
    vertical-align: middle;
    background: #fff;
}

.horario {
    background: #8b1e1e;
    color: white;
    font-weight: bold;
}

</style>
</head>

<body>

<h1>📚 Cronograma de Estudos</h1>

<table id="tabela">
    <tr>
        <th>Horário</th>
        <th>Seg</th>
        <th>Ter</th>
        <th>Qua</th>
        <th>Qui</th>
        <th>Sex</th>
        <th>Sáb</th>
        <th>Dom</th>
    </tr>
</table>

<script>
let tabela = document.getElementById("tabela");

// horários (você pode editar)
let horarios = ["08:00","10:00","14:00","16:00","19:00"];

// cria linhas
horarios.forEach(h => {
    let tr = document.createElement("tr");

    let tdHorario = document.createElement("td");
    tdHorario.innerText = h;
    tdHorario.className = "horario";
    tr.appendChild(tdHorario);

    for(let i=0;i<7;i++){
        let td = document.createElement("td");
        td.id = `${h}-${i}`; // chave única
        tr.appendChild(td);
    }

    tabela.appendChild(tr);
});

// 🔥 PUXA DADOS DO PROFESSOR
let dados = JSON.parse(localStorage.getItem("dados")) || {};

Object.entries(dados).forEach(([key, d])=>{
    let [y, m, dia] = key.split("-").map(Number);

    let data = new Date(y, m, dia);
    let diaSemana = data.getDay(); // 0=domingo

    // ajuste para começar em segunda
    let coluna = diaSemana === 0 ? 6 : diaSemana - 1;

    // coloca sempre no primeiro horário (pode melhorar depois)
    let horario = "08:00";

    let celula = document.getElementById(`${horario}-${coluna}`);

    if(celula){
        celula.innerHTML += `<div>${d.materia}</div>`;
    }
});
</script>

</body>
</html>
